<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Visa &amp; Entry Briefing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=20260425c" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="header-left">
          <h1>Vibe Visa &amp; Entry Briefing</h1>
        </div>
        <div class="header-right">
          <button id="themeToggle" class="theme-toggle" type="button" title="Toggle dark mode">
            <span id="themeIcon">&#9790;</span>
          </button>
        </div>
      </header>

      <section class="card">
        <form id="visaForm" class="form">
          <div class="sectionTitle">Your passports</div>
          <div class="hint">Type to search, then click to add. Add as many as you hold.</div>
          <div id="passportChips" class="chips"></div>
          <div class="row" id="passportComboMount"></div>

          <div class="sectionTitle">Destinations</div>
          <div id="destinations"></div>
          <div class="row">
            <button type="button" id="addDestinationBtn" class="btn secondary">+ Add destination</button>
          </div>

          <div class="row" style="margin-top:18px;">
            <button type="submit" class="btn primary">Generate results</button>
          </div>

          <div id="errorBox" class="errorBox" role="alert" style="display:none;"></div>
        </form>
      </section>

      <section id="resultsSection" class="card" aria-live="polite" style="display:none;">
        <div class="sectionTitle">Destination visa requirements</div>
        <div id="resultsList" class="resultsList"></div>
        <div class="hint" id="resultsFooter" style="margin-top:14px;">
          Information is for general guidance only. Always verify with the official consulate or government site before travel.
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260425c"></script>
  </body>
</html>
